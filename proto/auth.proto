syntax = "proto3";

package library.auth;

import "common.proto";

service AuthService {
  rpc Login(LoginRequest) returns (TokenResponse);
  rpc Me(library.common.Empty) returns (CurrentUser);
  rpc Logout(library.common.Empty) returns (library.common.Empty);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message TokenResponse {
  string access_token = 1;
  string token_type = 2;
  int32 expires_in = 3;
}

message CurrentUser {
  string username = 1;
}
